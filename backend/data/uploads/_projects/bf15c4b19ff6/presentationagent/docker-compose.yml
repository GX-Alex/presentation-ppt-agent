#version: "3.8"

services:
  native-renderer:
    build: ./native_renderer
    ports:
      - "${NATIVE_RENDERER_PORT:-4100}:4100"
    environment:
      - NATIVE_RENDERER_PORT=4100
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4100/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - backend-data:/app/data
    env_file:
      - .env
    environment:
      - ENV=${ENV:-development}
      - PLAYWRIGHT_MAX_PAGES=${PLAYWRIGHT_MAX_PAGES:-3}
      - MODEL_CONTEXT_WINDOW=${MODEL_CONTEXT_WINDOW:-128000}
      - NATIVE_RENDERER_URL=http://native-renderer:4100
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - BACKEND_URL=http://backend:8000
      - NODE_ENV=${NODE_ENV:-development}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

volumes:
  backend-data:
