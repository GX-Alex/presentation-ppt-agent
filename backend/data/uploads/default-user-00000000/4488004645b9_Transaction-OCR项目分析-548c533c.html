<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transaction OCR项目分析</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }
  </style>
</head>
<body>
<section data-page-id="p01" class="deck-page" style="background:#f8fafc; color:#1e293b;">
  <style>
    :root {
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --primary-light: #60a5fa;
      --bg: #f8fafc;
      --text: #1e293b;
      --text-light: #64748b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .cover-container {
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* 装饰性几何图形 */
    .decorative-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(6, 1fr);
      pointer-events: none;
      opacity: 0.4;
    }

    .grid-cell {
      border: 0.5px solid rgba(59, 130, 246, 0.1);
    }

    /* 左侧装饰圆形 */
    .deco-circle-1 {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(59, 130, 246, 0.05) 100%);
      top: -100px;
      left: -100px;
    }

    .deco-circle-2 {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, transparent 100%);
      bottom: -50px;
      right: 10%;
    }

    .deco-circle-3 {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 2px solid rgba(59, 130, 246, 0.15);
      top: 20%;
      right: 15%;
    }

    /* OCR视觉图形 */
    .ocr-visual {
      position: absolute;
      right: 8%;
      top: 50%;
      transform: translateY(-50%);
      width: 320px;
      height: 400px;
    }

    .document-icon {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .doc-frame {
      position: absolute;
      width: 200px;
      height: 280px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(59, 130, 246, 0.15);
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      overflow: hidden;
    }

    .doc-header {
      height: 50px;
      background: var(--primary);
      display: flex;
      align-items: center;
      padding: 0 20px;
    }

    .doc-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      margin-right: 8px;
    }

    .doc-lines {
      padding: 20px;
    }

    .doc-line {
      height: 8px;
      background: #e2e8f0;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .doc-line:nth-child(2) { width: 80%; }
    .doc-line:nth-child(3) { width: 90%; }
    .doc-line:nth-child(4) { width: 60%; }

    /* 扫描线效果 */
    .scan-line {
      position: absolute;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      animation: scan 3s ease-in-out infinite;
      box-shadow: 0 0 20px var(--primary);
    }

    @keyframes scan {
      0%, 100% { top: 50px; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 280px; opacity: 0; }
    }

    /* OCR识别框 */
    .ocr-boxes {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      right: 60px;
    }

    .ocr-box {
      position: absolute;
      border: 2px solid var(--primary);
      border-radius: 4px;
      animation: pulse 2s ease-in-out infinite;
    }

    .ocr-box:nth-child(1) {
      width: 80px;
      height: 24px;
      top: -80px;
      left: 60px;
      animation-delay: 0s;
    }

    .ocr-box:nth-child(2) {
      width: 100px;
      height: 20px;
      top: -40px;
      left: 40px;
      animation-delay: 0.3s;
    }

    .ocr-box:nth-child(3) {
      width: 70px;
      height: 20px;
      top: 0px;
      left: 80px;
      animation-delay: 0.6s;
    }

    .ocr-box:nth-child(4) {
      width: 90px;
      height: 20px;
      top: 40px;
      left: 50px;
      animation-delay: 0.9s;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* 装饰数据点 */
    .data-points {
      position: absolute;
      left: 8%;
      bottom: 15%;
    }

    .data-point {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }

    .point-marker {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--primary);
      margin-right: 16px;
    }

    .point-text {
      font-size: 14px;
      color: var(--text-light);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* 主内容区 */
    .main-content {
      position: relative;
      z-index: 10;
      text-align: left;
      padding-left: 10%;
    }

    .title-block {
      margin-bottom: 24px;
    }

    .main-title {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 56px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }

    .main-title .highlight {
      color: var(--primary);
      position: relative;
    }

    .main-title .highlight::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 0;
      width: 100%;
      height: 8px;
      background: rgba(59, 130, 246, 0.2);
      z-index: -1;
    }

    .subtitle {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 22px;
      color: var(--text-light);
      font-weight: 400;
      max-width: 600px;
      line-height: 1.6;
    }

    /* 底部信息栏 */
    .footer-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
      display: flex;
      align-items: center;
      padding: 0 60px;
    }

    .footer-text {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 16px;
      color: white;
      opacity: 0.9;
    }

    .footer-divider {
      width: 1px;
      height: 30px;
      background: rgba(255,255,255,0.3);
      margin: 0 24px;
    }

    /* 右上角装饰 */
    .corner-accent {
      position: absolute;
      top: 60px;
      right: 60px;
      display: flex;
      align-items: center;
    }

    .accent-line {
      width: 60px;
      height: 3px;
      background: var(--primary);
      border-radius: 2px;
    }

    .accent-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
      margin-left: 8px;
    }
  </style>

  <div class="cover-container">
    <!-- 背景网格 -->
    <div class="decorative-grid">
      <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
    </div>

    <!-- 装饰圆形 -->
    <div class="deco-circle-1"></div>
    <div class="deco-circle-2"></div>
    <div class="deco-circle-3"></div>

    <!-- 右上角装饰 -->
    <div class="corner-accent">
      <div class="accent-line"></div>
      <div class="accent-dot"></div>
    </div>

    <!-- OCR视觉图形 -->
    <div class="ocr-visual">
      <div class="document-icon">
        <div class="doc-frame">
          <div class="doc-header">
            <div class="doc-dot"></div>
            <div class="doc-dot"></div>
            <div class="doc-dot"></div>
          </div>
          <div class="doc-lines">
            <div class="doc-line"></div>
            <div class="doc-line"></div>
            <div class="doc-line"></div>
            <div class="doc-line"></div>
          </div>
          <div class="scan-line"></div>
        </div>
        <div class="ocr-boxes">
          <div class="ocr-box"></div>
          <div class="ocr-box"></div>
          <div class="ocr-box"></div>
          <div class="ocr-box"></div>
        </div>
      </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
      <div class="title-block">
        <h1 class="main-title">
          <span class="highlight">Transaction OCR</span><br>
          项目分析
        </h1>
        <p class="subtitle">
          构建完整的票据识别处理系统，覆盖图像预处理、<br>
          文字识别、结构化提取全链路技术深度解析
        </p>
      </div>
    </div>

    <!-- 左侧数据点 -->
    <div class="data-points">
      <div class="data-point">
        <div class="point-marker"></div>
        <span class="point-text">全链路技术架构</span>
      </div>
      <div class="data-point">
        <div class="point-marker"></div>
        <span class="point-text">端到端解决方案</span>
      </div>
      <div class="data-point">
        <div class="point-marker"></div>
        <span class="point-text">智能化数据处理</span>
      </div>
    </div>

    <!-- 底部信息栏 -->
    <div class="footer-bar">
      <span class="footer-text">Transaction OCR</span>
      <div class="footer-divider"></div>
      <span class="footer-text">项目深度分析报告</span>
      <div class="footer-divider"></div>
      <span class="footer-text">2024</span>
    </div>
  </div>
</section>
</body>
</html>
